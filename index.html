<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gangsters</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1 id="app-title">Gangsters</h1>
      <div id="clock-block">
        <span id="day-display">DAY 1</span>
        <span id="time-display">MON 6:00 AM</span>
      </div>
      <div id="cash-block">
        <span id="cash-display">$25</span>
        <span id="cash-label">CASH</span>
      </div>
      <button id="menu-btn" class="icon-btn" aria-label="Menu" aria-haspopup="true">☰</button>
    </header>

    <main id="main-content">
      <div id="tab-map" class="tab-view active">
        <div id="map-container">
          <div id="map-viewport">
            <div id="map">
              <img id="map-background" src="images/map-background.png" alt="" draggable="false">
              <div id="turf-layer"></div>
              <div id="locations-layer"></div>
              <div id="player-marker">☺</div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-people" class="tab-view">
        <div class="tab-header">
          <h2>People</h2>
          <p class="tab-subtitle">Contacts &amp; crew</p>
        </div>
        <div id="people-content" class="tab-scroll"></div>
      </div>

      <div id="tab-jobs" class="tab-view">
        <div class="tab-header">
          <h2>Jobs</h2>
          <p class="tab-subtitle">Active operations</p>
        </div>
        <div id="jobs-content" class="tab-scroll"></div>
      </div>

      <div id="tab-log" class="tab-view">
        <div class="tab-header">
          <h2>Log</h2>
          <div id="log-filters" class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="crew">Crew</button>
            <button class="filter-btn" data-filter="business">Business</button>
            <button class="filter-btn" data-filter="law">Law</button>
            <button class="filter-btn" data-filter="rivals">Rivals</button>
          </div>
        </div>
        <div id="log-content" class="tab-scroll"></div>
      </div>
    </main>

    <footer id="bottom-chrome">
      <div id="time-controls" role="group" aria-label="Time speed">
        <button class="speed-btn" data-speed="0" title="Pause">||</button>
        <button class="speed-btn active" data-speed="1" title="Normal speed">&gt;</button>
        <button class="speed-btn" data-speed="2" title="Double speed">&gt;&gt;</button>
        <button class="speed-btn" data-speed="3" title="Triple speed">&gt;&gt;&gt;</button>
      </div>
      <nav id="bottom-nav">
        <button class="nav-btn active" data-tab="map">
          <span class="nav-icon">◎</span>
          <span class="nav-label">MAP</span>
        </button>
        <button class="nav-btn" data-tab="people">
          <span class="nav-icon">☺</span>
          <span class="nav-label">PEOPLE</span>
        </button>
        <button class="nav-btn" data-tab="jobs">
          <span class="nav-icon">▣</span>
          <span class="nav-label">JOBS</span>
        </button>
        <button class="nav-btn" data-tab="log">
          <span class="nav-icon">≡</span>
          <span class="nav-label">LOG</span>
        </button>
      </nav>
    </footer>

    <!-- Travel -->
    <div id="travel-modal" class="modal-full hidden">
      <div class="modal-bar">
        <span class="modal-bar-spacer"></span>
        <span class="modal-bar-title" id="travel-bar-title">TRAVELING</span>
        <button class="sheet-back" id="travel-close" aria-label="Close">✕</button>
      </div>
      <p class="modal-subtitle" id="travel-bar-time"></p>
      <div class="modal-body">
        <div class="travel-map-preview" id="travel-map-preview"></div>
        <div class="travel-stat-grid">
          <div class="travel-stat">
            <div class="travel-stat-label">Travel Time</div>
            <div class="travel-stat-value" id="travel-time">—</div>
          </div>
          <div class="travel-stat">
            <div class="travel-stat-label">Mode</div>
            <div class="travel-stat-value" id="travel-mode">On Foot</div>
          </div>
        </div>
        <div id="travel-risk" class="banner banner-caution hidden">
          <span class="banner-icon">⚠</span>
          <span id="travel-risk-text"></span>
        </div>
        <div id="travel-progress"><div id="travel-progress-bar"></div></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger-outline" id="travel-cancel">Cancel Travel</button>
      </div>
    </div>

    <!-- Encounter -->
    <div id="encounter-modal" class="modal-full hidden">
      <div class="modal-bar danger" id="encounter-bar">
        <span></span>
        <span class="modal-bar-title" id="encounter-title">ENCOUNTER</span>
        <span class="modal-bar-meta" id="encounter-bar-time"></span>
      </div>
      <div class="modal-body encounter-body">
        <div class="encounter-hero">
          <div id="encounter-portrait" class="portrait portrait-lg"></div>
        </div>
        <div class="encounter-content">
        <div class="dialogue-box" id="encounter-text"></div>
        <p class="actions-label">What do you do?</p>
        <div id="encounter-actions"></div>
        </div>
      </div>
      <div class="modal-footer modal-footer-cash">
        <span class="footer-cash-line">Cash on hand: <strong id="encounter-cash">$0</strong></span>
      </div>
    </div>

    <!-- Location -->
    <div id="location-panel" class="modal-sheet hidden">
      <div class="sheet-header">
        <button class="sheet-back" id="location-back">←</button>
        <h2 id="location-name">LOCATION</h2>
      </div>
      <p class="sheet-meta" id="location-time"></p>
      <p class="panel-label">Currently here</p>
      <ul id="location-characters" class="list-rows"></ul>
      <div id="location-actions"></div>
      <div class="sheet-footer">
        <button class="btn btn-secondary" id="location-leave">📍 Leave Location</button>
      </div>
    </div>

    <!-- Character -->
    <div id="character-panel" class="modal-sheet hidden">
      <div class="sheet-header sheet-header-minimal">
        <button class="sheet-back" id="character-back">←</button>
        <h2 id="character-sheet-title" class="sheet-header-title"></h2>
      </div>
      <div class="character-hero">
        <div id="character-portrait" class="portrait portrait-hero"></div>
      </div>
      <div class="character-info">
        <h2 id="character-name"></h2>
        <div class="character-tags">
          <span id="character-role" class="tag"></span>
        </div>
        <span id="character-relationship" class="status-word"></span>
      </div>
      <div class="dialogue-box" id="character-dialogue"></div>
      <p class="actions-label">What do you do?</p>
      <div id="character-actions"></div>
      <div class="sheet-footer">
        <button class="btn btn-leave" id="character-leave">✕ Leave</button>
      </div>
    </div>

    <!-- Job -->
    <div id="job-panel" class="modal-sheet hidden">
      <div class="sheet-header">
        <button class="sheet-back" id="job-back">←</button>
        <h2 id="job-title">JOB</h2>
      </div>
      <div id="job-details"></div>
      <div class="sheet-footer">
        <button class="btn btn-primary" id="job-accept">Accept</button>
        <button class="btn btn-secondary" id="job-decline">Decline</button>
      </div>
    </div>

    <!-- Menu drawer -->
    <div id="menu-drawer" class="modal-sheet hidden">
      <div class="sheet-toolbar">
        <button class="sheet-back" data-close="menu-drawer" aria-label="Close menu">✕</button>
      </div>
      <ul class="menu-list">
        <li><button class="menu-item" data-screen="turf">Turf Overview</button></li>
        <li><button class="menu-item" data-screen="storage">Storage &amp; Warehouses</button></li>
        <li><button class="menu-item" data-screen="bribery">Bribery Network</button></li>
        <li><button class="menu-item" data-screen="prison">Prison &amp; Court</button></li>
        <li><button class="menu-item" data-screen="garage">Garage</button></li>
        <li><button class="menu-item" data-screen="profile">Profile</button></li>
        <li><button class="menu-item" data-screen="settings">Settings</button></li>
        <li><button class="menu-item" data-screen="help">How to Play</button></li>
        <li class="menu-divider" role="separator"></li>
        <li><button class="menu-item menu-item-danger" data-action="reset">Reset Game</button></li>
      </ul>
    </div>

    <div id="menu-screen" class="modal-full hidden">
      <div class="sheet-header">
        <button id="menu-back" class="sheet-back">←</button>
        <h2 id="menu-screen-title">Menu</h2>
        <button class="sheet-back" data-close="menu-screen">✕</button>
      </div>
      <div id="menu-screen-content" class="tab-scroll"></div>
    </div>

    <div id="result-toast" class="hidden"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/world.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/map-viewport.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
